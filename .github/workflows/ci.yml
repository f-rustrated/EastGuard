name: CI

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      simulation_seeds:
        description: Deterministic simulation seeds to run
        required: false
        default: "500"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        
      - name: Run tests
        run: cargo test --all

      - name: Run extended deterministic simulation campaign
        if: github.event_name != 'pull_request'
        env:
          EG_SIM_SEED_COUNT: ${{ github.event.inputs.simulation_seeds || '500' }}
        run: cargo test sim_campaign -- --nocapture --test-threads=1

      - name: Upload minimized simulation failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-bugbase
          path: bugbase/*.json
          if-no-files-found: ignore
