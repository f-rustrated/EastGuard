    { path = "turmoil::net::tcp::OwnedWriteHalf", reason = "Direct dependency on replaceable dependency is prohibited" },
    { path = "turmoil::net::tcp::ReadHalf", reason = "Direct dependency on replaceable dependency is prohibited" },
    { path = "turmoil::net::tcp::WriteHalf", reason = "Direct dependency on replaceable dependency is prohibited" },
